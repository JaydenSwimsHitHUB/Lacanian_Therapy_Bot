app = "lacanian-actions"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[processes]
  app = "run actions --port 5055"

[[services]]
  processes = ["app"]
  internal_port = 5055
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [services.concurrency]
    type = "connections"
    soft_limit = 20
    hard_limit = 25

[experimental]
  auto_rollback = true

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "chat_history_v2"
  destination = "/app/persistent"